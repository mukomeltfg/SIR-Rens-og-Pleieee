<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>SIR Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="admin.css"></head><body class="admin-page">
<main class="admin-shell"><header class="admin-header"><div><a href="index.html" class="logo"><span>SIR</span> Rens & Pleie</a><h1>Ordreadministrasjon</h1><p>Kun administrator kan se og endre ordrestatus.</p></div><button id="logoutBtn" class="btn ghost" hidden>Logg ut</button></header>
<section id="setupWarning" class="admin-warning" hidden><h2>Supabase er ikke koblet til</h2><p>Åpne <code>config.js</code>, lim inn Project URL og Anon key, og kjør <code>supabase.sql</code> i Supabase SQL Editor.</p></section>
<section id="loginPanel" class="admin-card"><h2>Sikker innlogging</h2><form id="loginForm"><label>E-post<input id="adminEmail" type="email" autocomplete="username" required></label><label>Passord<input id="adminPassword" type="password" autocomplete="current-password" required minlength="6"></label><button class="btn primary wide">Logg inn</button><p id="loginStatus" class="form-status"></p></form></section>
<section id="ordersPanel" hidden><div class="admin-toolbar"><div><h2>Bestillinger</h2><p id="orderCount"></p></div><button id="refreshBtn" class="btn ghost">Oppdater</button></div><div id="adminOrders" class="admin-orders"></div></section>
</main><div id="toast" class="toast" role="status"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="config.js?v=2"></script><script src="admin.js?v=2"></script></body></html>
